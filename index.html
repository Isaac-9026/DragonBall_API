<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>DBZ SPA - Personajes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    
    <header>
      <h1>Dragon Ball Z - Explorador de Personajes</h1>
    </header>

    <section id="filtro">
      <h2>Filtrar por raza</h2>

      <label>Selecciona una raza:</label>
      <select id="selectRaza"></select>

      <button id="btnMostrar">Mostrar</button>
    </section>

    <section id="tablaPersonajes">
      <h2>Lista de personajes</h2>

      <table border="1">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Ki</th>
            <th>Género</th>
            <th>Imagen</th>
            <th>Detalles</th>
          </tr>
        </thead>
        <tbody id="tbodyPersonajes"></tbody>
      </table>
    </section>

    <section id="seccionTransformaciones" style="display: none">
      <h2 id="nombrePersonaje"></h2>

      <img id="imgTransformacion" width="200" alt="Imagen del personaje" />

      <p id="descPersonaje"></p>

      <p id="descTransformacion"></p>

      <select id="selectTransformaciones"></select>
      <button id="btnVerTransformacion">Mostrar transformación</button>
    </section>

    <footer>
      <p>Proyecto SPA - Dragon Ball API</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
